name: "国家电网小组件"
description: "v1.4.0 · 显示与耗时查询分离；先运行“国家电网·更新数据”，主组件随后读取本地缓存。"
author: "Wyatt323"
homepage: "https://github.com/Wyatt323/GJDW-Egern"
manual: "https://github.com/Wyatt323/GJDW-Egern#readme"
open_url: "https://github.com/Wyatt323/GJDW-Egern"
icon: "bolt.house.fill"

env_schema:
  SGCC_USERNAME:
    name: "网上国网账号"
    description: "通常为登录手机号；仅保存在 Egern 模块环境变量中。"
  SGCC_PASSWORD:
    name: "网上国网密码"
    description: "与 95598.cn / 网上国网 App 相同的登录密码。"
  SGCC_DEBUG:
    name: "调试日志"
    options:
      - "false"
      - "true"
    default_value: "false"
  ACCOUNT_INDEX:
    name: "户号序号"
    description: "多户时从 0 开始选择：第一个户号填 0，第二个填 1。"
    default_value: "0"
  DISPLAY_NAME:
    name: "显示名称（可选）"
    description: "如“家里”“父母家”，填写后会覆盖自动获取的名称。"
  DATA_URL:
    name: "兼容数据接口（可选）"
    description: "可返回旧版网上国网小组件 JSON 数组的接口；不建议填写含明文密码的地址。"
  OPEN_URL:
    name: "点击跳转地址"
    default_value: "https://www.95598.cn/osgweb/index"
  ACCOUNT:
    name: "户号（手动兜底）"
  BALANCE:
    name: "余额（手动兜底）"
  MONTH_KWH:
    name: "本月用电 kWh（手动兜底）"
  MONTH_FEE:
    name: "本月电费（手动兜底）"
  LATEST_KWH:
    name: "最近一日用电 kWh（手动兜底）"
  OVERDUE:
    name: "是否欠费"
    options:
      - "false"
      - "true"

scriptings:
  - generic:
      name: "state-grid-widget"
      script_url: "https://raw.githubusercontent.com/Wyatt323/GJDW-Egern/refs/heads/main/state-grid-widget.js?v=1.4.0"
      update_interval: 86400
      timeout: 10
      env:
        RUN_MODE: "view"
  - generic:
      name: "state-grid-updater"
      script_url: "https://raw.githubusercontent.com/Wyatt323/GJDW-Egern/refs/heads/main/state-grid-widget.js?v=1.4.0"
      update_interval: 86400
      timeout: 100
      env:
        RUN_MODE: "update"
  - schedule:
      name: "state-grid-auto-update"
      cron: "15 8,18 * * *"
      script_url: "https://raw.githubusercontent.com/Wyatt323/GJDW-Egern/refs/heads/main/state-grid-widget.js?v=1.4.0"
      update_interval: 86400
      timeout: 100
      env:
        RUN_MODE: "update"
  - generic:
      name: "state-grid-health"
      script_url: "https://raw.githubusercontent.com/Wyatt323/GJDW-Egern/refs/heads/main/state-grid-health.js?v=1.4.0"
      update_interval: 86400
      timeout: 10

widgets:
  - name: "国家电网"
    script_name: "state-grid-widget"
  - name: "国家电网·更新数据"
    script_name: "state-grid-updater"
  - name: "国家电网·诊断"
    script_name: "state-grid-health"
